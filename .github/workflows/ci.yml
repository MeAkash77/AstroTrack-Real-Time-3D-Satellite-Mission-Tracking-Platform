name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (.NET 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore backend/AstroTrack.sln

      - name: Build
        run: dotnet build backend/AstroTrack.sln --no-restore -c Release

      - name: Test
        run: dotnet test backend/AstroTrack.sln --no-build -c Release

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker smoke build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t astrotrack-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t astrotrack-frontend:ci ./frontend
