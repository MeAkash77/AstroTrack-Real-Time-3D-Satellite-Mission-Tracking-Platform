name: Bug report
description: Report a problem with AstroTrack
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report. Please fill out the sections below so we can reproduce and fix the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running AstroTrack?
      options:
        - Self-hosted via Docker Compose (build from source)
        - Self-hosted via prebuilt images (docker-compose.prod.yml)
        - Local dev (dotnet run + npm run dev)
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag or git commit SHA you are running.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Output from `docker compose logs -f backend` or the browser console. This is automatically formatted into code, so no backticks needed.
      render: shell
